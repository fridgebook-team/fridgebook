<div class="search-container">
  <input 
    #searchInput
    type="text"
    [(ngModel)]="currentSearch"
    (input)="onSearchInput()"
    placeholder="Rezept suchen (z.B. Pizza, Linsen...)"
    class="search-input"
  />
  
  <div class="recent-searches" *ngIf="recentSearches.length > 0 && !currentSearch">
    <div class="recent-title">Letzte Suchen</div>
    <div class="recent-list">
      <div 
        class="recent-item" 
        *ngFor="let term of recentSearches"
        (click)="selectRecentSearch(term)"
      >
        {{ term }}
      </div>
    </div>
  </div>

  <div class="results" *ngIf="currentSearch">
    <div class="results-title">Ergebnisse für "{{ currentSearch }}"</div>
    <div class="results-list">
      <div class="result-item" *ngFor="let recipe of filteredRecipes">
        <div class="result-name">{{ recipe.name }}</div>
        <div class="result-details">
          <span>{{ recipe.prepTime }} min</span>
          <span>{{ recipe.ingredients.length }} Zutaten</span>
        </div>
      </div>
    </div>
    <div class="no-results" *ngIf="filteredRecipes.length === 0">
      Keine Rezepte gefunden. Versuche es mit einem anderen Begriff.
    </div>
  </div>
</div>
