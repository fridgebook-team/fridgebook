<div class="space-above"></div>
<div class="container py-4 shopping-page">

  <header class="text-center mb-4">
    <h1>Deine Einkaufsliste</h1>
  </header>

  <div *ngIf="statusMessage" class="status-toast">{{ statusMessage }}</div>

  <section>
    <p class="section-label">{{ items.length }} Artikel</p>
    <div class="shopping-list">
      @for (item of items; track item.id) {
        <div class="shopping-item">
          <div class="item-check-circle" (click)="removeItem(item)"></div>
          <span class="item-text">{{ item.name }}</span>
          <div class="quantity-controls">
            <button (click)="decreaseQuantity(item)" class="btn-round">-</button>
            <span class="item-quantity">{{ item.quantity }} {{ item.unit }}</span>
            <button (click)="increaseQuantity(item)" class="btn-round">+</button>
          </div>
        </div>
      }
      @if (items.length === 0) {
        <p class="empty-hint">Noch nichts hier. Tippe auf + um etwas hinzuzufügen!</p>
      }
    </div>
  </section>

  <app-barcode-scanner #barcodeScanner (productScanned)="onProductScanned($event)" />
</div>

<!-- Floating + Button -->
<button class="fab" (click)="openAddSheet()">+</button>

<!-- Bottom Sheet -->
@if (showAddSheet) {
  <div class="modal-backdrop" (click)="closeAddSheet()"></div>
  <div class="add-sheet">
    <h5 class="sheet-title">Zur Liste hinzufügen</h5>

    <div class="mb-3">
      <input type="text" class="form-control custom-input" placeholder="z.B. Tomaten"
        [(ngModel)]="newItem.name" (keyup.enter)="submitNewItem()">
    </div>

    <div class="mb-4 d-flex gap-2">
      <input type="number" class="form-control custom-input" placeholder="Menge"
        [(ngModel)]="newItem.quantity" min="1" style="flex:1">
      <select class="form-select custom-input" [(ngModel)]="newItem.unit" style="flex:1">
        <option *ngFor="let u of unitOptions" [value]="u">{{ u }}</option>
      </select>
    </div>

    <div class="d-flex gap-2 justify-content-end mb-3">
      <button class="btn-beige" (click)="closeAddSheet()">Abbrechen</button>
      <button class="btn-olive" (click)="submitNewItem()" [disabled]="!newItem.name">Hinzufügen</button>
    </div>

    <div class="scan-row">
      <button class="btn-beige scan-btn" (click)="openBarcode()" [disabled]="barcodeScannerRef.isLookupLoading">
        <i class="bi bi-upc-scan me-1"></i> Barcode
      </button>
      <app-receipt-scan-button (statusChange)="onStatusChange($event)" />
    </div>
  </div>
}
